apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tradelab-dev

resources:
  - ../../base
  - ingress-frontend-entrypoint.yaml
  - ingress-backend-entrypoint.yaml
  - middleware-strip-prefix.yaml

images:
  - name: ghcr.io/aidun/tradelab-backend
    newTag: master
  - name: ghcr.io/aidun/tradelab-frontend
    newTag: master

patches:
  - path: patch-ingress-delete.yaml
  - path: patch-backend-configmap.yaml
  - path: patch-frontend-configmap.yaml
