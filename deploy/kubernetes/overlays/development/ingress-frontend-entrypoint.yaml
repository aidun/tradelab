apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradelab-frontend-entrypoint
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /tradelab-dev
            pathType: Prefix
            backend:
              service:
                name: tradelab-frontend
                port:
                  number: 3000
