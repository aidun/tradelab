apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradelab-backend-entrypoint
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: tradelab-dev-tradelab-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /tradelab-dev/api
            pathType: Prefix
            backend:
              service:
                name: tradelab-backend
                port:
                  number: 8080
