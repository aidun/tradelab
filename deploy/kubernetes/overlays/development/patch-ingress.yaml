apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradelab
spec:
  rules:
    - host: tradelab.localtest.me
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tradelab-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tradelab-frontend
                port:
                  number: 3000
