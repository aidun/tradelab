apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradelab
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /tradelab-dev/api
            pathType: Prefix
            backend:
              service:
                name: tradelab-backend
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: tradelab-backend
                port:
                  number: 8080
          - path: /tradelab-dev
            pathType: Prefix
            backend:
              service:
                name: tradelab-frontend
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tradelab-frontend
                port:
                  number: 3000
