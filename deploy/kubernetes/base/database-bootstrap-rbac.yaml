apiVersion: v1
kind: ServiceAccount
metadata:
  name: tradelab-database-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tradelab-database-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tradelab-database-bootstrap
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
subjects:
  - kind: ServiceAccount
    name: tradelab-database-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tradelab-database-bootstrap
