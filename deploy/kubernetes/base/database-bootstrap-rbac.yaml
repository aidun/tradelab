apiVersion: v1
kind: ServiceAccount
metadata:
  name: tradelab-database-bootstrap
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tradelab-database-bootstrap
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tradelab-database-bootstrap
subjects:
  - kind: ServiceAccount
    name: tradelab-database-bootstrap
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tradelab-database-bootstrap
