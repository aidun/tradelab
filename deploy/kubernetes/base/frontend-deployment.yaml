apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradelab-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tradelab-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tradelab-frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/aidun/tradelab-frontend:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: tradelab-frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
