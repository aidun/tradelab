apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradelab-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aidun/tradelab.git
    targetRevision: master
    path: deploy/infrastructure/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
