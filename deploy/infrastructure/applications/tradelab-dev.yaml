apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradelab-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aidun/tradelab.git
    targetRevision: master
    path: deploy/kubernetes/overlays/development
  destination:
    server: https://kubernetes.default.svc
    namespace: tradelab-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
