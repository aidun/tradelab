<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1490" y2="940" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030706"/>
      <stop offset="0.48" stop-color="#07100D"/>
      <stop offset="1" stop-color="#0B1713"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0D1714"/>
      <stop offset="1" stop-color="#09110F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="32" flood-color="#000000" flood-opacity="0.36"/>
    </filter>
    <style>
      .display { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; letter-spacing: -0.045em; }
      .body { font-family: 'Segoe UI', Arial, sans-serif; }
      .mono { font-family: 'Consolas', 'Courier New', monospace; }
      .text { fill: #F4F7F5; }
      .muted { fill: #98A79F; }
      .subtle { fill: #C7D1CB; }
      .accent { fill: #77FC18; }
      .surface { fill: url(#panel); stroke: #1C2B25; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1320" cy="140" r="250" fill="#164A23" fill-opacity="0.12"/>
  <circle cx="280" cy="840" r="280" fill="#143522" fill-opacity="0.14"/>
  <text x="72" y="84" class="mono accent" font-size="15" letter-spacing="0.34em">TRADELAB / USE CASE 1 / ENTRY GATE</text>
  <text x="72" y="124" class="display text" font-size="42">A serious trading product starts with a deliberate access decision</text>

  <rect x="62" y="186" width="1476" height="736" rx="38" fill="#08110F" stroke="#16241F"/>
  <rect x="62" y="186" width="836" height="736" rx="38" fill="none"/>

  <text x="120" y="292" class="mono muted" font-size="13" letter-spacing="0.28em">ENTRY</text>
  <text x="120" y="374" class="display text" font-size="84">Trade with clarity.</text>
  <text x="120" y="434" class="body subtle" font-size="24">Access a premium paper-trading workspace with explicit account choice, confident information hierarchy, and no sandbox-first product framing.</text>

  <line x1="120" y1="500" x2="470" y2="500" stroke="#22332D"/>
  <text x="120" y="548" class="mono muted" font-size="13" letter-spacing="0.22em">WHY THIS MATTERS</text>
  <text x="120" y="590" class="body text" font-size="22">The product should feel like a credible trading terminal before the first position is ever placed.</text>
  <text x="120" y="628" class="body muted" font-size="19">Guest access remains first-class, but it becomes an intentional path rather than the default identity story.</text>

  <rect x="940" y="248" width="500" height="520" rx="32" class="surface" filter="url(#shadow)"/>
  <text x="978" y="300" class="mono accent" font-size="12" letter-spacing="0.24em">ACCESS YOUR WORKSPACE</text>
  <text x="978" y="364" class="display text" font-size="56">TradeLab</text>
  <text x="978" y="410" class="body subtle" font-size="22">Choose how you want to enter the workspace.</text>

  <rect x="978" y="462" width="424" height="76" rx="22" fill="#77FC18"/>
  <text x="1190" y="510" class="body" font-size="23" font-weight="700" text-anchor="middle" fill="#07110C">Create account</text>

  <rect x="978" y="558" width="206" height="60" rx="18" fill="#0B1513" stroke="#263A32"/>
  <text x="1081" y="596" class="body text" font-size="20" font-weight="600" text-anchor="middle">Log in</text>

  <rect x="1196" y="558" width="206" height="60" rx="18" fill="#0B1513" stroke="#263A32"/>
  <text x="1299" y="596" class="body subtle" font-size="20" font-weight="600" text-anchor="middle">Continue as guest</text>

  <line x1="978" y1="656" x2="1402" y2="656" stroke="#22332D"/>
  <text x="978" y="700" class="body muted" font-size="18">No silent guest bootstrap. No tutorial-style hero. No “demo” CTA language on the front door.</text>

  <text x="72" y="950" class="body muted" font-size="16">Direction: institutional dark-green foundation, restrained copy, explicit access choice, and a product frame that already feels operational.</text>
</svg>
