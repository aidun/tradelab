name: Bug report
description: Report a reproducible product or engineering defect.
title: "[Bug]: "
labels:
  - "type: bug"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem in TradeLab. Please share enough detail for the team to reproduce and triage it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can the team reproduce the issue?
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, local/dev/prod context, and any relevant runtime details.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Logs, screenshots, or links that help the team triage.
    validations:
      required: false
