name: Auto Merge PR

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-on-green:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Merge PR into master
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];

            if (prs.length === 0) {
              core.info("No pull request associated with this workflow run.");
              return;
            }

            const pr = prs[0];

            if (pr.base.ref !== "master") {
              core.info(`Skipping PR #${pr.number} because base branch is ${pr.base.ref}.`);
              return;
            }

            core.info(`Merging PR #${pr.number} from ${pr.head.ref} into ${pr.base.ref}.`);

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: "squash"
            });

            core.info(`PR #${pr.number} merged successfully.`);
