name: Publish Master Images

on:
  push:
    branches:
      - master
    paths-ignore:
      - deploy/infrastructure/applications/tradelab-dev.yaml
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to publish for development backfill
        required: true
        default: master
        type: string

permissions:
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: publish-master-images
  cancel-in-progress: true

jobs:
  publish-master-images:
    name: Build and publish master images
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
      full_sha: ${{ steps.meta.outputs.full_sha }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      branch_short_sha: ${{ steps.meta.outputs.branch_short_sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.sha }}

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          branch_short_sha="$(git rev-parse --short HEAD)"
          source_ref="${{ github.event_name == 'workflow_dispatch' && inputs.source_ref || github.sha }}"
          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "branch_short_sha=$branch_short_sha" >> "$GITHUB_OUTPUT"
          echo "full_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/aidun/tradelab-backend:master
            ghcr.io/aidun/tradelab-backend:master-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}
            org.opencontainers.image.version=master-${{ steps.meta.outputs.short_sha }}
            org.opencontainers.image.source=https://github.com/aidun/tradelab

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_BUILD_RELEASE=master-${{ steps.meta.outputs.short_sha }}
            NEXT_PUBLIC_BUILD_BRANCH=master
            NEXT_PUBLIC_BUILD_COMMIT=${{ steps.meta.outputs.full_sha }}
            NEXT_PUBLIC_BASE_PATH=/tradelab-dev
            NEXT_PUBLIC_API_BASE_URL=/tradelab-dev
            NEXT_PUBLIC_AUTH_MOCK_MODE=true
          tags: |
            ghcr.io/aidun/tradelab-frontend:master
            ghcr.io/aidun/tradelab-frontend:master-${{ steps.meta.outputs.short_sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}
            org.opencontainers.image.version=master-${{ steps.meta.outputs.short_sha }}
            org.opencontainers.image.source=https://github.com/aidun/tradelab

  update-dev-application:
    name: Update development Argo target
    needs:
      - publish-master-images
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update development application manifest
        shell: python
        env:
          FULL_SHA: ${{ needs.publish-master-images.outputs.full_sha }}
          SHORT_SHA: ${{ needs.publish-master-images.outputs.short_sha }}
        run: |
          from pathlib import Path
          import os

          app_file = Path("deploy/infrastructure/applications/tradelab-dev.yaml")
          full_sha = os.environ["FULL_SHA"]
          short_sha = os.environ["SHORT_SHA"]
          backend_image = f"ghcr.io/aidun/tradelab-backend:master-{short_sha}"
          frontend_image = f"ghcr.io/aidun/tradelab-frontend:master-{short_sha}"
          lines = []
          in_source = False
          in_kustomize = False
          replaced_target = False
          replaced_backend = False
          replaced_frontend = False

          for line in app_file.read_text(encoding="utf-8").splitlines():
            stripped = line.strip()
            if stripped == "source:":
              in_source = True
            elif in_source and line.startswith("  ") and not line.startswith("    "):
              in_source = False

            if in_source and stripped.startswith("targetRevision:"):
              lines.append(f"    targetRevision: {full_sha}")
              replaced_target = True
              continue

            if in_source and stripped == "kustomize:":
              in_kustomize = True
              lines.append(line)
              continue

            if in_kustomize and stripped.startswith("- ghcr.io/aidun/tradelab-backend:"):
              lines.append(f"        - {backend_image}")
              replaced_backend = True
              continue

            if in_kustomize and stripped.startswith("- ghcr.io/aidun/tradelab-frontend:"):
              lines.append(f"        - {frontend_image}")
              replaced_frontend = True
              continue

            if in_kustomize and line.startswith("  ") and not line.startswith("      "):
              in_kustomize = False

            lines.append(line)

          if not replaced_target:
            raise SystemExit("targetRevision not updated in tradelab-dev application")
          if not replaced_backend or not replaced_frontend:
            raise SystemExit("development image overrides not updated in tradelab-dev application")

          app_file.write_text("\n".join(lines) + "\n", encoding="utf-8")

      - name: Create development target update pull request
        id: dev_target_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN != '' && secrets.AUTOMATION_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: Update development Argo target to ${{ needs.publish-master-images.outputs.short_sha }}
          title: Update development Argo target to ${{ needs.publish-master-images.outputs.short_sha }}
          body: |
            ## Summary
            - update `tradelab-dev` to the newly published `master-${{ needs.publish-master-images.outputs.short_sha }}` images
            - pin the Argo application source revision to `${{ needs.publish-master-images.outputs.full_sha }}`

            ## Source
            - workflow: `Publish Master Images`
            - source ref: `${{ needs.publish-master-images.outputs.source_ref }}`
            - source commit: `${{ needs.publish-master-images.outputs.full_sha }}`
          branch: automation/update-tradelab-dev-target
          branch-suffix: short-commit-hash
          delete-branch: true
          add-paths: |
            deploy/infrastructure/applications/tradelab-dev.yaml

      - name: Report development target pull request status
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.dev_target_pr.outcome }}" = "success" ]; then
            echo "Development target update PR created successfully."
            exit 0
          fi

          branch="automation/update-tradelab-dev-target-${{ needs.publish-master-images.outputs.branch_short_sha }}"
          compare_url="https://github.com/${{ github.repository }}/compare/master...${branch}?expand=1"
          echo "::warning title=Development target PR not created::GitHub Actions pushed branch '${branch}' but could not open the pull request automatically. Enable the repository setting 'Allow GitHub Actions to create and approve pull requests' or configure the AUTOMATION_GITHUB_TOKEN secret, then open ${compare_url}"
          {
            echo "## Development target update requires follow-up"
            echo
            echo "- branch pushed: \`${branch}\`"
            echo "- compare URL: ${compare_url}"
            echo "- next action: enable GitHub Actions PR creation or configure \`AUTOMATION_GITHUB_TOKEN\`"
          } >> "$GITHUB_STEP_SUMMARY"
