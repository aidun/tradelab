name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_AUTH_MOCK_MODE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_AUTH_MOCK_MODE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_AUTH_MOCK_MODE: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E tests
        working-directory: frontend
        run: npm run test:e2e

  backend-container:
    name: Backend container build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t tradelab-backend:test .

  frontend-container:
    name: Frontend container build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t tradelab-frontend:test .

  kubernetes-manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Render Argo CD bootstrap install
        run: kubectl kustomize deploy/infrastructure/bootstrap/argocd-install > /tmp/tradelab-argocd-install.yaml

      - name: Render Argo CD root application
        run: kubectl kustomize deploy/infrastructure/bootstrap/root-application > /tmp/tradelab-argocd-root.yaml

      - name: Render infrastructure applications
        run: kubectl kustomize deploy/infrastructure/applications > /tmp/tradelab-infra-apps.yaml

      - name: Render platform namespaces
        run: kubectl kustomize deploy/infrastructure/platform/namespaces > /tmp/tradelab-platform-namespaces.yaml

      - name: Render MetalLB config
        run: kubectl kustomize deploy/infrastructure/platform/metallb/config > /tmp/tradelab-metallb-config.yaml

      - name: Render development overlay
        run: kubectl kustomize deploy/kubernetes/overlays/development > /tmp/tradelab-dev.yaml

      - name: Render production overlay
        run: kubectl kustomize deploy/kubernetes/overlays/production > /tmp/tradelab-prod.yaml

      - name: Render production overlay with External Secrets
        run: kubectl kustomize deploy/kubernetes/overlays/production-external-secrets > /tmp/tradelab-prod-external-secrets.yaml

      - name: Validate immutable release manifest rendering
        run: |
          chmod +x deploy/kubernetes/render-release-manifests.sh
          ./deploy/kubernetes/render-release-manifests.sh v0.0.ci /tmp/tradelab-release.yaml
          grep "ghcr.io/aidun/tradelab-backend:v0.0.ci" /tmp/tradelab-release.yaml
          grep "ghcr.io/aidun/tradelab-frontend:v0.0.ci" /tmp/tradelab-release.yaml

  metadata-validation:
    name: Metadata validation
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate AI metadata JSON
        run: node -e "JSON.parse(require('fs').readFileSync('docs/ai-metadata.json','utf8'));"
