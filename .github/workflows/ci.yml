name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run backend tests
        working-directory: backend
        run: go test ./...

  frontend-test:
    name: Frontend unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm run test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  backend-container:
    name: Backend container build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t tradelab-backend:test .

  frontend-container:
    name: Frontend container build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t tradelab-frontend:test .

  kubernetes-manifests:
    name: Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.32.2

      - name: Prepare development secret inputs
        run: cp deploy/kubernetes/overlays/development/.env.database.example deploy/kubernetes/overlays/development/.env.database

      - name: Render development overlay
        run: kubectl kustomize deploy/kubernetes/overlays/development > /tmp/tradelab-dev.yaml

      - name: Render production overlay
        run: kubectl kustomize deploy/kubernetes/overlays/production > /tmp/tradelab-prod.yaml
