name: Promote Production

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional release tag to deploy. Leave empty to use the latest published GitHub release.
        required: false
        default: ""

permissions:
  contents: write

jobs:
  resolve-release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Resolve release tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ inputs.release_tag }}"
          if [ -z "$tag" ]; then
            tag="$(gh release view --json tagName --jq '.tagName')"
          else
            gh release view "$tag" --json tagName --jq '.tagName' >/dev/null
          fi
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

  promote-production:
    name: Update production Argo target
    needs:
      - resolve-release
    runs-on: ubuntu-latest

    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Update production application manifests
        shell: python
        env:
          RELEASE_TAG: ${{ needs.resolve-release.outputs.release_tag }}
        run: |
          from pathlib import Path
          import os

          release_tag = os.environ["RELEASE_TAG"]
          prod_file = Path("deploy/infrastructure/applications/tradelab-prod.yaml")
          lines = []
          in_source = False
          in_kustomize = False
          backend_image = f"ghcr.io/aidun/tradelab-backend:{release_tag}"
          frontend_image = f"ghcr.io/aidun/tradelab-frontend:{release_tag}"
          for line in prod_file.read_text(encoding="utf-8").splitlines():
            stripped = line.strip()
            if stripped == "source:":
              in_source = True
            elif in_source and line.startswith("  ") and not line.startswith("    "):
              in_source = False

            if in_source and stripped.startswith("targetRevision:"):
              lines.append(f"    targetRevision: {release_tag}")
              continue

            if in_source and stripped == "kustomize:":
              in_kustomize = True
              lines.append(line)
              continue

            if in_kustomize and stripped.startswith("- ghcr.io/aidun/tradelab-backend:"):
              lines.append(f"        - {backend_image}")
              continue

            if in_kustomize and stripped.startswith("- ghcr.io/aidun/tradelab-frontend:"):
              lines.append(f"        - {frontend_image}")
              continue

            if in_kustomize and line.startswith("  ") and not line.startswith("      "):
              in_kustomize = False

            lines.append(line)

          prod_file.write_text("\n".join(lines) + "\n", encoding="utf-8")

      - name: Commit promotion change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/infrastructure/applications/tradelab-prod.yaml
          if git diff --cached --quiet; then
            echo "Production already points at the requested release tag."
            exit 0
          fi
          git commit -m "Promote production to ${{ needs.resolve-release.outputs.release_tag }}"
          git push origin HEAD:master
