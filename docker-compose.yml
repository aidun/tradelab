services:
  postgres:
    image: postgres:16-alpine
    container_name: tradelab-postgres
    environment:
      POSTGRES_DB: tradelab
      POSTGRES_USER: tradelab
      POSTGRES_PASSWORD: tradelab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
